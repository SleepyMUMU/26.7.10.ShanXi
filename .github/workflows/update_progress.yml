name: Update Progress README

on:
  push:
    paths:
      - '**.json'
      - 'update_readme.py'
      - 'config.json'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run progress calculation script
        run: python update_readme.py

      - name: Commit text changes to main
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md progress_history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update progress README" && git push origin HEAD:main)

      - name: Commit SVG to orphan branch (assets)
        run: |
          if [ -f "progress_chart.svg" ]; then
            # 把 SVG 移出当前目录防止被分支切换清空
            mv progress_chart.svg /tmp/progress_chart.svg
            
            # 创建或切换到无历史记录的孤儿分支
            git checkout --orphan assets
            
            # 强制清空分支内的所有文件追踪
            git rm -rf .
            
            # 将生成的图片放入纯净分支中
            mv /tmp/progress_chart.svg .
            git add progress_chart.svg
            git commit -m "Auto-update SVG chart"
            
            # 强推至远端，保持极小体积
            git push --force origin assets
          fi
